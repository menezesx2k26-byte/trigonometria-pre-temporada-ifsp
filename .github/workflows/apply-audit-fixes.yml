name: Apply audited fixes

on:
  push:
    branches:
      - fix/auditoria-pedagogica
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/auditoria-pedagogica
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply fixes
        run: |
          node scripts/apply-audit-fixes.mjs
          node scripts/fix-editorial-test.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1

      - name: Commit build diagnostics
        if: steps.build.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build.log
          git commit -m "Add audit build diagnostics"
          git push origin HEAD:fix/auditoria-pedagogica

      - name: Commit validated changes
        if: steps.build.outcome == 'success'
        run: |
          rm scripts/apply-audit-fixes.mjs
          rm scripts/fix-editorial-test.mjs
          rm -f build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Improve feedback and curriculum accuracy"
          git push origin HEAD:fix/auditoria-pedagogica

      - name: Fail after diagnostics
        if: steps.build.outcome == 'failure'
        run: exit 1
