name: Apply audited fixes

on:
  push:
    branches:
      - fix/auditoria-pedagogica

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply fixes
        run: node scripts/apply-audit-fixes.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit validated changes
        run: |
          rm scripts/apply-audit-fixes.mjs
          rm .github/workflows/apply-audit-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Improve feedback and curriculum accuracy"
          git push
